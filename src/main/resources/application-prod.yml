#application-prod.yml
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://db:3306/appdb?useUnicode=true&characterEncoding=utf8}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.mariadb.jdbc.Driver}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

  security:
    oauth2:
      client:
        registration:
          naver:
            client-id: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_CLIENT_ID}
            client-secret: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_CLIENT_SECRET}
            client-name: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_CLIENT_NAME:Naver}
            authorization-grant-type: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_AUTHORIZATION_GRANT_TYPE:authorization_code}
            redirect-uri: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
            client-authentication-method: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_CLIENT_AUTHENTICATION_METHOD:client_secret_post}
            scope:
              - name
              - email
              - birthyear
        provider:
          naver:
            authorization-uri: ${SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_NAVER_AUTHORIZATION_URI}
            token-uri: ${SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_NAVER_TOKEN_URI}
            user-info-uri: ${SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_NAVER_USER_INFO_URI}
            user-name-attribute: ${SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_NAVER_USER_NAME_ATTRIBUTE:response}

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    access-exp-seconds: ${APP_JWT_ACCESS_EXP_SECONDS:3600}
    refresh-exp-seconds: ${APP_JWT_REFRESH_EXP_SECONDS:1209600}

  frontend-url: ${APP_FRONTEND_URL:https://www.esjh.shop}

  cookie:
    secure: true
    same-site: None
    domain: ${APP_COOKIE_DOMAIN:}